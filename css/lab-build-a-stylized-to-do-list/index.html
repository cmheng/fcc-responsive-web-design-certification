<!DOCTYPE html>
<html lang="en">

<head>

    <title>Styled To-Do List</title>

</head>

<body>

        </ul>
      </li>
      <li class="task">

        </ul>
      </li>

        <input type="checkbox" id="task1"><label for="task1">Check Processor Specs</label>

</body>

</html>
